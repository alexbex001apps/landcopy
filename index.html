
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading v2</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f8f7f3;--accent:#e8420a;--dark:#0e0d0a;--muted:#7a7060;--border:#e0dbd0;--success:#1a7a3a;--neon-blue:#00d4ff;--neon-orange:#ff5520;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);display:flex;align-items:center;justify-content:center;min-height:100vh;}

.loading-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;max-width:520px;width:100%;padding:40px;}

.spinner{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

.loading-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--dark);text-align:center;}
.dot{display:inline-block;animation:dotPulse 1.4s infinite;}
.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}
@keyframes dotPulse{0%,80%,100%{opacity:0;transform:translateY(0);}40%{opacity:1;transform:translateY(-3px);}}

/* Global progress */
.progress-wrap{width:100%;background:var(--border);border-radius:20px;height:3px;overflow:hidden;}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),#ff8c00);border-radius:20px;transition:width 0.5s ease;width:0%;}
.step-counter{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-align:center;}

/* Steps */
.steps{display:flex;flex-direction:column;gap:6px;width:100%;}

.step{
  display:flex;
  flex-direction:column;
  gap:4px;
  padding:10px 16px;
  border-radius:6px;
  opacity:0.2;
  transition:all 0.4s ease;
}
.step-row{
  display:flex;
  align-items:center;
  gap:10px;
}
.step-icon{font-size:14px;flex-shrink:0;width:20px;text-align:center;}
.step-text{font-size:13px;color:var(--muted);font-weight:400;}

/* Step line bar */
.step-line{
  height:2px;
  background:var(--border);
  border-radius:2px;
  margin-left:30px;
  overflow:hidden;
}
.step-line-fill{
  height:100%;
  width:0%;
  border-radius:2px;
  background:linear-gradient(90deg,var(--accent),#ff8c00,#ffe600);
}

/* DONE */
.step.done{opacity:0.5;}
.step.done .step-text{color:var(--success);}
.step.done .step-line-fill{width:100%;background:var(--success);}

/* ACTIVE */
.step.active{
  opacity:1;
  background:rgba(232,66,10,0.04);
  animation:stepGlow 2s ease-in-out infinite;
}
.step.active .step-text{
  color:var(--dark);
  font-weight:600;
  font-size:14px;
}
.step.active .step-text::after{
  content:'|';
  margin-left:2px;
  color:var(--accent);
  animation:blink 0.7s step-end infinite;
}
.step.active .step-line-fill{
  animation:fillLine 1.8s ease-out forwards;
}
@keyframes fillLine{from{width:0%;}to{width:100%;}}
@keyframes stepGlow{0%,100%{background:rgba(232,66,10,0.04);}50%{background:rgba(232,66,10,0.09);}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
</style>
</head>
<body>

<div class="loading-wrap">
  <div class="spinner"></div>
  <div class="loading-title">Generando contenido<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
  <div class="progress-wrap"><div class="progress-bar" id="progress"></div></div>
  <div class="step-counter" id="counter">Paso 1 de 12</div>

  <div class="steps" id="steps-wrap"></div>
</div>

<script>
const stepsData = [
  { icon:'⚡', text:'Analizando producto y mercado' },
  { icon:'🤖', text:'Usando IA entrenada para tu nicho' },
  { icon:'🎯', text:'Identificando puntos de dolor del cliente' },
  { icon:'❤️', text:'Estudio emocional de compra' },
  { icon:'🌎', text:'Análisis por país elegido' },
  { icon:'🎭', text:'Análisis por tono elegido' },
  { icon:'🧠', text:'Pensando estrategia de conversión' },
  { icon:'✍️', text:'Escribiendo copy persuasivo profesional' },
  { icon:'🚀', text:'Aplicando técnicas de ventas poderosas' },
  { icon:'📱', text:'Adaptando para cada canal de marketing' },
  { icon:'💰', text:'Optimizando para máximo rendimiento' },
  { icon:'✅', text:'Finalizando tu landing ganadora' },
];

const wrap = document.getElementById('steps-wrap');
stepsData.forEach((s, i) => {
  wrap.innerHTML += `
    <div class="step" id="s${i}">
      <div class="step-row">
        <span class="step-icon">${s.icon}</span>
        <span class="step-text">${s.text}</span>
      </div>
      <div class="step-line"><div class="step-line-fill" id="fill${i}"></div></div>
    </div>`;
});

let current = 0;
const progress = document.getElementById('progress');
const counter = document.getElementById('counter');
const total = stepsData.length;

function advance() {
  if(current < total) {
    if(current > 0) {
      document.getElementById(`s${current-1}`).classList.remove('active');
      document.getElementById(`s${current-1}`).classList.add('done');
    }
    document.getElementById(`s${current}`).classList.add('active');
    // Reset and restart fill animation
    const fill = document.getElementById(`fill${current}`);
    fill.style.animation = 'none';
    fill.offsetHeight; // reflow
    fill.style.animation = '';
    const pct = Math.round(((current+1)/total)*100);
    progress.style.width = pct + '%';
    counter.textContent = `Paso ${current+1} de ${total}`;
    current++;
  } else {
    // Reset demo
    document.querySelectorAll('.step').forEach(el => el.classList.remove('active','done'));
    document.querySelectorAll('.step-line-fill').forEach(el => {el.style.animation='none';el.offsetHeight;el.style.animation='';});
    document.getElementById('s0').classList.add('active');
    current = 1;
    progress.style.width = '8%';
    counter.textContent = 'Paso 1 de 12';
  }
}

advance();
setInterval(advance, 1800);
</script>
</body>
</html>
